name: Create article from content issue

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-article:
    if: contains(github.event.issue.labels.*.name, 'content')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract article content from issue form
        id: extract
        shell: bash
        run: |
          error_log="$(mktemp)"
          if ! node .github/scripts/extract-article.js 2>"$error_log"; then
            delimiter="OUTPUT_$(uuidgen)"
            {
              echo "message<<$delimiter"
              cat "$error_log"
              echo "$delimiter"
            } >> "$GITHUB_OUTPUT"
            rm -f "$error_log"
            exit 1
          fi
          rm -f "$error_log"

      - name: Sanitize article title
        id: sanitize-title
        uses: actions/github-script@v7
        env:
          ARTICLE_TITLE: ${{ steps.extract.outputs.article_title }}
        with:
          script: |
            const rawTitle = process.env.ARTICLE_TITLE ?? '';
            const sanitizedTitle = rawTitle
              .replace(/[\r\n]+/g, ' ')
              .replace(/[\u0000-\u001F\u007F]/g, '')
              .replace(/\s+/g, ' ')
              .trim() || 'untitled';

            core.setOutput('article_title', sanitizedTitle);

      - name: Create pull request
        id: create-pull-request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.extract.outputs.branch }}
          commit-message: "article: ${{ steps.sanitize-title.outputs.article_title }}"
          title: "article: ${{ steps.sanitize-title.outputs.article_title }}"
          body: |
            此 PR 由內容提案 issue 自動產生。

            對應 issue：#${{ github.event.issue.number }} ${{ github.event.issue.title }}

            產生檔案：`${{ steps.extract.outputs.filepath }}`

            Closes #${{ github.event.issue.number }}
          labels: |
            content
            automated pr
          delete-branch: true

      - name: Comment on issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = "${{ steps.create-pull-request.outputs.pull-request-number }}";
            if (prNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `已根據 issue 內容建立檔案並開啟 PR：#${prNumber}`
              });
            }

      - name: Comment error on issue
        if: failure() && steps.extract.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          ERROR_MESSAGE: ${{ steps.extract.outputs.message }}
        with:
          script: |
            const errorMessage = process.env.ERROR_MESSAGE || '未知錯誤';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `建立文章失敗，錯誤訊息如下：\n\n\`\`\`\n${errorMessage}\n\`\`\`\n\n請直接修改這個 issue 的內容，儲存後會自動重新執行。`
            });
