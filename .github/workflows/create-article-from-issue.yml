name: Create article from content issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-article:
    if: contains(github.event.issue.labels.*.name, 'content')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract article content from issue form
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || "";

            // 取出 "### 文章內容 / Article Content" 區塊
            // 直到下一個 "### " 標題或字串結尾
            const match = body.match(
              /###\s*文章內容\s*\/\s*Article Content\s*\n([\s\S]*?)(?=\n###\s|$)/
            );

            if (!match) {
              core.setFailed('找不到「文章內容 / Article Content」欄位');
              return;
            }

            let content = match[1].trim();

            // Issue Form 有時會把空白內容顯示成 _No response_
            if (!content || content === "_No response_") {
              core.setFailed('「文章內容 / Article Content」欄位是空的');
              return;
            }

            // category 也順便抓出來，方便組檔名或路徑
            const categoryMatch = body.match(
              /###\s*分類\s*\/\s*Category\s*\n([\s\S]*?)(?=\n###\s|$)/
            );
            const categoryRaw = categoryMatch ? categoryMatch[1].trim() : "uncategorized";

            // 類別取英文前半段，例如 "History (歷史)" -> "History"
            const category = categoryRaw.replace(/\s*\(.*?\)\s*$/, "").trim();

            // 產生安全檔名
            const slugBase = (issue.title || `article-${issue.number}`)
              .replace(/^\[Article\]\s*/i, "")
              .trim()
              .toLowerCase()
              .replace(/[^a-z0-9\u4e00-\u9fff\s-]/g, "")
              .replace(/\s+/g, "-")
              .replace(/-+/g, "-")
              .replace(/^-|-$/g, "");

            const slug = slugBase || `article-${issue.number}`;

            // 指定目錄
            const dir = `knowledge/${category}`;
            const filename = `${slug}.md`;
            const filepath = `${dir}/${filename}`;

            core.setOutput("content", content);
            core.setOutput("category", category);
            core.setOutput("dir", dir);
            core.setOutput("filename", filename);
            core.setOutput("filepath", filepath);
            core.setOutput("branch", `content/issue-${issue.number}-${slug}`);

      - name: Create markdown file
        run: |
          mkdir -p "${{ steps.extract.outputs.dir }}"
          cat > "${{ steps.extract.outputs.filepath }}" <<'EOF'
          ${{ steps.extract.outputs.content }}
          EOF

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.extract.outputs.branch }}
          commit-message: "content: add article from issue #${{ github.event.issue.number }}"
          title: "content: add article from issue #${{ github.event.issue.number }}"
          body: |
            Auto-generated from issue #${{ github.event.issue.number }}

            Source issue:
            - #${{ github.event.issue.number }} ${{ github.event.issue.title }}

            Generated file:
            - `${{ steps.extract.outputs.filepath }}`
          labels: |
            content
            automated pr
          delete-branch: true

      - name: Comment on issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = "${{ steps.create-pull-request.outputs.pull-request-number }}";
            if (prNumber) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `已根據 issue 內容建立檔案並開啟 PR：#${prNumber}`
              });
            }