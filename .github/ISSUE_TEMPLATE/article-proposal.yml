name: 📝 文章提案 / Article Proposal
description: 提議一篇新文章或提供完整文章內容
title: "[Article] "
labels: ["content"]
body:
  - type: dropdown
    id: category
    attributes:
      label: 分類 / Category
      options:
        - Art (藝術)
        - Culture (文化)
        - Economy (經濟)
        - Food (美食)
        - Geography (地理)
        - History (歷史)
        - Lifestyle (生活)
        - Music (音樂)
        - Nature (自然)
        - People (人物)
        - Society (社會)
        - Technology (科技)
    validations:
      required: true
  - type: textarea
    id: content
    attributes:
      label: 文章內容 / Article Content
      description: |
        可以是完整文章（含 frontmatter），也可以只是主題提案。
        完整文章格式請參考 [CONTRIBUTING.md](https://github.com/frank890417/taiwan-md/blob/main/CONTRIBUTING.md)
      placeholder: |
        ---
        title: "文章標題"
        description: "一句話描述"
        date: 2026-01-01
        tags: ["tag1", "tag2"]
        ---
        
        # 文章標題
        
        ## 30 秒概覽
        ...
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: 參考資料 / Sources
      description: 請提供可查證的資料來源
      placeholder: "- https://example.com/source1\n- 學術論文/書籍名稱"
    validations:
      required: false
